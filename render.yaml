services:
  # Next.js Frontend UI (Web Service)
  - type: web
    name: floodguard-frontend
    env: node
    rootDir: code/frontend
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_VERSION
        value: 20.x
      # Database connection variables that Render will prompt you for
      - key: DB_HOST
        sync: false
      - key: DB_PORT
        sync: false
      - key: DB_NAME
        sync: false
      - key: DB_USER
        sync: false
      - key: DB_PASSWORD
        sync: false

  # Python Orchestrator (Background Worker)
  - type: worker
    name: floodguard-backend
    env: python
    rootDir: .
    buildCommand: pip install -r requirements.txt
    startCommand: python code/main.py
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.x
      # Syncs variables with the frontend service so you only input them once
      - key: DB_HOST
        fromService:
          type: web
          name: floodguard-frontend
          envVarKey: DB_HOST
      - key: DB_PORT
        fromService:
          type: web
          name: floodguard-frontend
          envVarKey: DB_PORT
      - key: DB_NAME
        fromService:
          type: web
          name: floodguard-frontend
          envVarKey: DB_NAME
      - key: DB_USER
        fromService:
          type: web
          name: floodguard-frontend
          envVarKey: DB_USER
      - key: DB_PASSWORD
        fromService:
          type: web
          name: floodguard-frontend
          envVarKey: DB_PASSWORD
